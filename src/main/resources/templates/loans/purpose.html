<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{loans.purpose.name}">Открыть кредит На любые цели</title>
    <link rel="stylesheet" href="../static/css/styles.css" th:href="@{/css/styles.css}">
    <meta charset="UTF-8">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="loan-form-page">

    <a class="back-link" href="index.html" th:href="@{/loans}" th:text="#{loans.back}">Назад к кредитам</a>

    <section class="loan-application-card">
        <div class="loan-form-header">
            <span th:text="#{loans.open}">Открыть кредит</span>
            <h1 th:text="#{loans.purpose.name}">На любые цели</h1>
            <p th:text="#{loans.application.description}">Укажите желаемую сумму. Срок, процентную ставку и ежемесячный платеж менеджер рассчитает индивидуально и отправит вам после рассмотрения заявки.</p>
        </div>

        <form class="loan-application-form" method="post" th:action="@{/loans/purpose}" th:object="${loanApplicationRequest}">
            <div class="loan-message loan-message-success" th:if="${loanSuccess}" th:text="${loanSuccess}">Заявка отправлена.</div>
            <div class="loan-message loan-message-error" th:if="${loanError}" th:text="${loanError}">Ошибка.</div>

            <div class="loan-form-field">
                <label for="amount" th:text="#{loans.amount}">Сумма</label>
                <input id="amount" name="amount" th:field="*{amount}" type="number" min="0.01" step="0.01" placeholder="0" required>
            </div>

            <button class="loan-submit-button" type="submit" th:text="#{loans.application.submit}">Отправить заявку</button>
        </form>
    </section>

</main>

</body>
</html>
