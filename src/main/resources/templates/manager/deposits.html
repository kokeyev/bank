<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{manager.deposits.title}">Deposit requests</title>
    <link rel="stylesheet" href="../../static/css/styles.css" th:href="@{/css/styles.css}">
    <meta charset="UTF-8">
</head>
<body>

<div th:replace="~{fragments/manager-header :: header}"></div>

<main class="loans-page">

    <h1 th:text="#{manager.deposits.title}">Deposit requests</h1>

    <div class="loan-message loan-message-success" th:if="${depositManagerSuccess}" th:text="${depositManagerSuccess}">Готово.</div>
    <div class="loan-message loan-message-error" th:if="${depositManagerError}" th:text="${depositManagerError}">Ошибка.</div>

    <div class="manager-batch-actions">
        <form method="post" th:action="@{/manager/deposits/accrue-interest}">
            <input type="hidden" name="_csrf" th:value="${csrfToken}">
            <button class="loan-submit-button" type="submit" th:text="#{manager.deposits.accrueInterest}">Accrue interest</button>
        </form>
        <form method="post" th:action="@{/manager/deposits/process-expiration}">
            <input type="hidden" name="_csrf" th:value="${csrfToken}">
            <button class="loan-secondary-button" type="submit" th:text="#{manager.deposits.processExpiration}">Process expiration</button>
        </form>
    </div>

    <div class="accounts-empty-state" th:if="${pendingDepositsPage == null || pendingDepositsPage.items.isEmpty()}">
        <p th:text="#{manager.deposits.empty}">No deposit requests.</p>
    </div>

    <div class="client-deposits-list" th:if="${pendingDepositsPage != null && !pendingDepositsPage.items.isEmpty()}">
        <section class="client-deposit-card" th:each="deposit : ${pendingDepositsPage.items}">
            <div class="client-deposit-topline">
                <div>
                    <div class="client-deposit-name" th:text="${deposit.name}">Копилка</div>
                    <div class="client-deposit-status" th:text="${deposit.status}">На рассмотрении</div>
                </div>
                <div class="client-deposit-amount">
                    <span th:text="${deposit.amount}">100 000.00</span>
                    <span th:text="${deposit.currency}">KZT</span>
                </div>
            </div>

            <div class="client-deposit-details">
                <div>
                    <span th:text="#{accounts.rate}">Rate</span>
                    <strong th:text="${deposit.rate}">11.5%</strong>
                </div>
                <div>
                    <span th:text="#{accounts.duration}">Term</span>
                    <strong th:text="${deposit.duration}">12 мес.</strong>
                </div>
                <div>
                    <span th:text="#{accounts.autoRenewal}">Auto renewal</span>
                    <strong th:text="${deposit.autoRenewal}">Да</strong>
                </div>
                <div>
                    <span th:text="#{accounts.capitalization}">Capitalization</span>
                    <strong th:text="${deposit.reinvestInterest}">Да</strong>
                </div>
            </div>

            <div class="client-loan-actions">
                <form method="post" th:action="@{/manager/deposits/{depositId}/approve(depositId=${deposit.depositId})}">
            <input type="hidden" name="_csrf" th:value="${csrfToken}">
                    <button class="loan-submit-button" type="submit" th:text="#{common.approve}">Approve</button>
                </form>
                <form method="post" th:action="@{/manager/deposits/{depositId}/reject(depositId=${deposit.depositId})}">
            <input type="hidden" name="_csrf" th:value="${csrfToken}">
                    <button class="loan-secondary-button" type="submit" th:text="#{common.reject}">Reject</button>
                </form>
            </div>
        </section>
    </div>

    <nav class="pagination" th:if="${pendingDepositsPage != null && pendingDepositsPage.totalPages > 1}">
        <a th:if="${pendingDepositsPage.hasPrevious}" th:href="@{/manager/deposits(page=${pendingDepositsPage.currentPage - 1})}" th:text="#{pagination.previous}">Previous</a>
        <span th:text="${pendingDepositsPage.currentPage + ' / ' + pendingDepositsPage.totalPages}">1 / 1</span>
        <a th:if="${pendingDepositsPage.hasNext}" th:href="@{/manager/deposits(page=${pendingDepositsPage.currentPage + 1})}" th:text="#{pagination.next}">Next</a>
    </nav>

</main>

</body>
</html>
