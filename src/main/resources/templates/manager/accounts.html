<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{manager.accounts.title}">Account requests</title>
    <link rel="stylesheet" href="../../static/css/styles.css" th:href="@{/css/styles.css}">
    <meta charset="UTF-8">
</head>
<body>

<div th:replace="~{fragments/manager-header :: header}"></div>

<main class="accounts-page">

    <header class="accounts-title">
        <p class="accounts-greeting" th:text="#{manager.accounts.title}">Account requests</p>
    </header>

    <div class="account-message account-message-success" th:if="${managerAccountSuccess}" th:text="${managerAccountSuccess}"></div>
    <div class="account-message account-message-error" th:if="${managerAccountError}" th:text="${managerAccountError}"></div>

    <div class="accounts-empty-state" th:if="${pendingAccountsPage == null || pendingAccountsPage.items.isEmpty()}">
        <p th:text="#{manager.accounts.empty}">No account opening requests.</p>
    </div>

    <div class="accounts-list" th:if="${pendingAccountsPage != null && !pendingAccountsPage.items.isEmpty()}">
        <div class="account-card" th:each="account : ${pendingAccountsPage.items}">
            <div class="account-info">
                <div class="account-name" th:text="${account.name}">Основной счет</div>
                <div class="account-status-row">
                    <span class="account-status-badge" th:text="${account.statusLabel}">На рассмотрении</span>
                </div>

                <div class="account-header">
                    <div class="balance" th:text="${account.balance}">0.00</div>
                    <div class="currency-icon" th:text="${account.currency}">KZT</div>
                </div>

                <div class="card-number" th:text="${account.cardNumber}">
                    4400 1234 5678 9012
                </div>

                <div class="card-details">
                    <span th:text="${account.expiryDate}">12/29</span>
                    <span>CVV: <span th:text="${account.cvv}">123</span></span>
                </div>
            </div>

            <div class="account-actions">
                <form class="action-block" method="post" th:action="@{/manager/accounts/{accountId}/approve(accountId=${account.accountId})}">
            <input type="hidden" name="_csrf" th:value="${csrfToken}">
                    <button type="submit" th:text="#{common.approve}">Approve</button>
                </form>

                <form class="action-block" method="post" th:action="@{/manager/accounts/{accountId}/reject(accountId=${account.accountId})}">
            <input type="hidden" name="_csrf" th:value="${csrfToken}">
                    <button class="deactivate-account-button" type="submit" th:text="#{common.reject}">Reject</button>
                </form>
            </div>
        </div>
    </div>
    <nav class="pagination" th:if="${pendingAccountsPage != null && pendingAccountsPage.totalPages > 1}">
        <a th:if="${pendingAccountsPage.hasPrevious}" th:href="@{/manager/accounts(page=${pendingAccountsPage.currentPage - 1})}" th:text="#{pagination.previous}">Previous</a>
        <span th:text="${pendingAccountsPage.currentPage + ' / ' + pendingAccountsPage.totalPages}">1 / 1</span>
        <a th:if="${pendingAccountsPage.hasNext}" th:href="@{/manager/accounts(page=${pendingAccountsPage.currentPage + 1})}" th:text="#{pagination.next}">Next</a>
    </nav>

</main>

</body>
</html>
