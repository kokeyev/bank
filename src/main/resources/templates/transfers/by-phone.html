<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{transfers.phone}">Перевод по номеру телефона</title>
    <link rel="stylesheet" href="../../static/css/styles.css" th:href="@{/css/styles.css}">
    <meta charset="UTF-8">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="transfer-form-page">

    <a class="back-link" href="index.html" th:href="@{/transfers}" th:text="#{transfers.back}">Назад к операциям</a>

    <section class="transfer-form-card">
        <h1 th:text="#{transfers.phone}">Перевод по номеру телефона</h1>

        <form class="transfer-form" method="post" th:action="@{/transfers/by-phone}" th:object="${phoneTransferRequest}">
            <input type="hidden" name="_csrf" th:value="${csrfToken}">
            <div class="transfer-message transfer-message-success" th:if="${phoneTransferSuccess}" th:text="${phoneTransferSuccess}">
                Перевод выполнен.
            </div>

            <div class="transfer-message transfer-message-error" th:if="${phoneTransferError}" th:text="${phoneTransferError}">
                Не удалось выполнить перевод.
            </div>

            <div class="transfer-field">
                <label for="fromAccount" th:text="#{transfers.whereFrom}">Откуда</label>
                <select id="fromAccount" name="senderAccountId" th:field="*{senderAccountId}" required>
                    <option value="" disabled selected th:text="#{transfers.accountList}">Список счетов</option>
                    <option th:each="account : ${accountOptions}" th:value="${account.accountId}" th:text="${account.label}">
                        Основная - 125 430.50 KZT
                    </option>
                </select>
            </div>

            <div class="transfer-field">
                <label for="recipientPhone" th:text="#{transfers.whereTo}">Куда</label>
                <span class="transfer-field-caption" th:text="#{transfers.recipientPhone}">Номер получателя</span>
                <div class="phone-input">
                    <span>+7</span>
                    <input id="recipientPhone" name="receiverPhoneNumber" th:field="*{receiverPhoneNumber}" type="tel" placeholder="700 000 00 00" required>
                </div>
            </div>

            <div class="transfer-field">
                <label for="amount" th:text="#{transfers.amount}">Сумма перевода</label>
                <input id="amount" name="amount" th:field="*{amount}" type="number" min="0.01" step="0.01" placeholder="0" required>
            </div>

            <div class="transfer-field">
                <label for="message" th:text="#{transfers.message}">Сообщение</label>
                <input id="message" name="message" th:field="*{message}" type="text" th:placeholder="#{transfers.message.placeholder}">
            </div>

            <div class="commission-row">
                <span th:text="#{transfers.commission}">Комиссия</span>
                <strong>0 ₸</strong>
            </div>

            <button class="transfer-submit-button" type="submit" th:disabled="${accountOptions == null || accountOptions.isEmpty()}" th:text="#{transfers.submit}">Перевести</button>
        </form>
    </section>

</main>

</body>
</html>
