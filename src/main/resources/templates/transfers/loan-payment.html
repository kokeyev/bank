<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Погасить кредит</title>
    <link rel="stylesheet" href="../../static/css/styles.css" th:href="@{/css/styles.css}">
    <meta charset="UTF-8">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="transfer-form-page">

    <a class="back-link" href="index.html" th:href="@{/transfers}">Назад к операциям</a>

    <section class="transfer-form-card">
        <h1>Погасить кредит</h1>

        <form class="transfer-form" method="post" th:action="@{/transfers/loan-payment}" th:object="${loanPaymentRequest}">
            <div class="transfer-message transfer-message-success" th:if="${loanPaymentSuccess}" th:text="${loanPaymentSuccess}">
                Платеж выполнен.
            </div>

            <div class="transfer-message transfer-message-error" th:if="${loanPaymentError}" th:text="${loanPaymentError}">
                Не удалось выполнить платеж.
            </div>

            <div class="transfer-field">
                <label for="fromAccount">Со счета</label>
                <select id="fromAccount" name="sourceAccountId" th:field="*{sourceAccountId}" required>
                    <option value="" disabled selected>Список счетов</option>
                    <option th:each="account : ${accountOptions}" th:value="${account.accountId}" th:text="${account.label}">
                        Основная - 125 430.50 KZT
                    </option>
                </select>
            </div>

            <div class="transfer-field">
                <label for="loan">Кредит</label>
                <select id="loan" name="loanId" th:field="*{loanId}" required>
                    <option value="" disabled selected>Список кредитов</option>
                    <option th:each="loan : ${loanOptions}" th:value="${loan.loanId}" th:text="${loan.label}">
                        Автокредит - остаток 3 450 000 KZT
                    </option>
                </select>
            </div>

            <div class="transfer-field">
                <label for="amount">Сумма перевода</label>
                <input id="amount" name="amount" th:field="*{amount}" type="number" min="0.01" step="0.01" placeholder="0" required>
            </div>

            <div class="commission-row">
                <span>Комиссия</span>
                <strong>0 ₸</strong>
            </div>

            <button class="transfer-submit-button" type="submit" th:disabled="${accountOptions == null || accountOptions.isEmpty() || loanOptions == null || loanOptions.isEmpty()}">Погасить</button>
        </form>
    </section>

</main>

</body>
</html>
