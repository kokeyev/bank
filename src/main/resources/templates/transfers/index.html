<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Переводы</title>
    <link rel="stylesheet" href="../static/css/styles.css" th:href="@{/css/styles.css}">
    <meta charset="UTF-8">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="transfers-page">

    <h1>Операции</h1>

    <div class="transfer-list">
        <a class="transfer-option" href="between-accounts.html" th:href="@{/transfers/between-accounts}">Перевод между своими счетами</a>
        <a class="transfer-option" href="by-phone.html" th:href="@{/transfers/by-phone}">Перевод по номеру телефона</a>
        <a class="transfer-option" href="by-card.html" th:href="@{/transfers/by-card}">Перевод по номеру карты</a>
        <a class="transfer-option" href="deposit-top-up.html" th:href="@{/transfers/deposit-top-up}">Пополнить депозит</a>
        <a class="transfer-option" href="loan-payment.html" th:href="@{/transfers/loan-payment}">Погасить кредит</a>
        <a class="transfer-option" href="currency-exchange.html" th:href="@{/transfers/currency-exchange}">Обмен валют</a>
    </div>

    <section class="transaction-history-section">
        <h2>История операций</h2>

        <div class="accounts-empty-state" th:if="${transactions == null || transactions.isEmpty()}">
            <p th:if="${loggedIn}">Операций пока нет.</p>
            <p th:unless="${loggedIn}">Войдите в аккаунт, чтобы увидеть историю операций.</p>
        </div>

        <div class="transaction-history-list" th:if="${transactions != null && !transactions.isEmpty()}">
            <div class="transaction-history-row" th:each="transaction : ${transactions}">
                <div>
                    <strong th:text="${transaction.type}">Между своими счетами</strong>
                    <span th:text="${transaction.date}">11.06.2026 15:00</span>
                </div>
                <div>
                    <strong th:text="${transaction.amount}">10 000.00 KZT</strong>
                    <span th:text="${transaction.message}">Назначение</span>
                </div>
            </div>
        </div>
    </section>

</main>

</body>
</html>
