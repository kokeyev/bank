<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Пополнить депозит</title>
    <link rel="stylesheet" href="../../static/css/styles.css" th:href="@{/css/styles.css}">
    <meta charset="UTF-8">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="transfer-form-page">

    <a class="back-link" href="index.html" th:href="@{/transfers}">Назад к операциям</a>

    <section class="transfer-form-card">
        <h1>Пополнить депозит</h1>

        <form class="transfer-form" method="post" th:action="@{/transfers/deposit-top-up}">
            <div class="transfer-field">
                <label for="fromAccount">Со счета</label>
                <select id="fromAccount" name="fromAccount" required>
                    <option value="" disabled selected>Список счетов</option>
                    <option value="main">Основная - 125 430.50 ₸</option>
                    <option value="usd">Долларовый счет - 820.00 $</option>
                    <option value="eur">Евро счет - 540.00 €</option>
                </select>
            </div>

            <div class="transfer-field">
                <label for="toDeposit">На депозит</label>
                <select id="toDeposit" name="toDeposit" required>
                    <option value="" disabled selected>Список депозитов</option>
                    <option value="kopilka">Копилка - 350 000 ₸</option>
                    <option value="strategy">Стратегия - 1 200 000 ₸</option>
                    <option value="capital">Капитал - 2 500 $</option>
                </select>
            </div>

            <div class="transfer-field">
                <label for="amount">Сумма перевода</label>
                <input id="amount" name="amount" type="number" placeholder="0" required>
            </div>

            <div class="commission-row">
                <span>Комиссия</span>
                <strong>0 ₸</strong>
            </div>

            <button class="transfer-submit-button" type="submit">Пополнить депозит</button>
        </form>
    </section>

</main>

</body>
</html>
