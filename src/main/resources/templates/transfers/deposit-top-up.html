<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{transfers.depositTopUp}">Пополнить депозит</title>
    <link rel="stylesheet" href="../../static/css/styles.css" th:href="@{/css/styles.css}">
    <meta charset="UTF-8">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="transfer-form-page">

    <a class="back-link" href="index.html" th:href="@{/transfers}" th:text="#{transfers.back}">Назад к операциям</a>

    <section class="transfer-form-card">
        <h1 th:text="#{transfers.depositTopUp}">Пополнить депозит</h1>

        <form class="transfer-form" method="post" th:action="@{/transfers/deposit-top-up}" th:object="${depositTopUpRequest}">
            <div class="transfer-message transfer-message-success" th:if="${depositTopUpSuccess}" th:text="${depositTopUpSuccess}">
                Депозит пополнен.
            </div>

            <div class="transfer-message transfer-message-error" th:if="${depositTopUpError}" th:text="${depositTopUpError}">
                Не удалось пополнить депозит.
            </div>

            <div class="transfer-message" th:if="${accountOptions == null || accountOptions.isEmpty() || depositOptions == null || depositOptions.isEmpty()}" th:text="#{transfers.deposit.needAccountAndDeposit}">
                Для пополнения нужен счет и открытый депозит.
            </div>

            <div class="transfer-field">
                <label for="fromAccount" th:text="#{transfers.from}">Со счета</label>
                <select id="fromAccount" name="sourceAccountId" th:field="*{sourceAccountId}" required>
                    <option value="" disabled selected th:text="#{transfers.accountList}">Список счетов</option>
                    <option th:each="account : ${accountOptions}" th:value="${account.accountId}" th:text="${account.label}">
                        Основная - 125 430.50 KZT
                    </option>
                </select>
            </div>

            <div class="transfer-field">
                <label for="toDeposit" th:text="#{transfers.deposit.to}">На депозит</label>
                <select id="toDeposit" name="depositId" th:field="*{depositId}" required>
                    <option value="" disabled selected th:text="#{transfers.deposit.list}">Список депозитов</option>
                    <option th:each="deposit : ${depositOptions}" th:value="${deposit.depositId}" th:text="${deposit.label}">
                        Копилка - 350 000 KZT
                    </option>
                </select>
            </div>

            <div class="transfer-field">
                <label for="amount" th:text="#{transfers.amount}">Сумма перевода</label>
                <input id="amount" name="amount" th:field="*{amount}" type="number" min="0.01" step="0.01" placeholder="0" required>
            </div>

            <div class="commission-row">
                <span th:text="#{transfers.commission}">Комиссия</span>
                <strong>0 ₸</strong>
            </div>

            <button class="transfer-submit-button" type="submit" th:disabled="${accountOptions == null || accountOptions.isEmpty() || depositOptions == null || depositOptions.isEmpty()}" th:text="#{transfers.deposit.submit}">Пополнить депозит</button>
        </form>
    </section>

</main>

</body>
</html>
