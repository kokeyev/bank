<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Обмен валют</title>
    <link rel="stylesheet" href="../../static/css/styles.css" th:href="@{/css/styles.css}">
    <meta charset="UTF-8">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="transfer-form-page">

    <a class="back-link" href="index.html" th:href="@{/transfers}">Назад к операциям</a>

    <section class="transfer-form-card">
        <h1>Обмен валют</h1>

        <form class="transfer-form" method="post" th:action="@{/transfers/currency-exchange}" th:object="${transferRequest}">
            <div class="transfer-message transfer-message-success" th:if="${exchangeSuccess}" th:text="${exchangeSuccess}">
                Обмен выполнен.
            </div>

            <div class="transfer-message transfer-message-error" th:if="${exchangeError}" th:text="${exchangeError}">
                Не удалось выполнить обмен.
            </div>

            <div class="transfer-field">
                <label for="fromAccount">Со счета</label>
                <select id="fromAccount" name="senderAccountId" th:field="*{senderAccountId}" required>
                    <option value="" disabled selected>Список счетов</option>
                    <option th:each="account : ${accountOptions}" th:value="${account.accountId}" th:text="${account.label}">
                        Основная - 125 430.50 KZT
                    </option>
                </select>
            </div>

            <div class="transfer-field">
                <label for="toAccount">На счет</label>
                <select id="toAccount" name="receiverAccountId" th:field="*{receiverAccountId}" required>
                    <option value="" disabled selected>Список счетов</option>
                    <option th:each="account : ${accountOptions}" th:value="${account.accountId}" th:text="${account.label}">
                        Долларовый - 100.00 USD
                    </option>
                </select>
            </div>

            <div class="transfer-field">
                <label for="amount">Сумма перевода</label>
                <input id="amount" name="amount" th:field="*{amount}" type="number" min="0.01" step="0.01" placeholder="0" required>
            </div>

            <div class="commission-row">
                <span>Информация о курсе</span>
                <strong>по текущему курсу</strong>
            </div>

            <div class="commission-row">
                <span>Сумма к зачислению</span>
                <strong>0 $</strong>
            </div>

            <div class="commission-row">
                <span>Комиссия</span>
                <strong>0 ₸</strong>
            </div>

            <button class="transfer-submit-button" type="submit" th:disabled="${accountOptions == null || accountOptions.size() < 2}">Перевести</button>
        </form>
    </section>

</main>

</body>
</html>
