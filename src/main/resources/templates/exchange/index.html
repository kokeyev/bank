<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Обменник</title>
    <link rel="stylesheet" href="../static/css/styles.css" th:href="@{/css/styles.css}">
    <meta charset="UTF-8">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="exchange-page">

    <h1>Обменник</h1>

    <div class="loan-message loan-message-success" th:if="${exchangeSuccess}" th:text="${exchangeSuccess}">Готово.</div>
    <div class="loan-message loan-message-error" th:if="${exchangeError}" th:text="${exchangeError}">Ошибка.</div>

    <div class="exchange-layout">
        <section class="exchange-rates-card">
            <div class="exchange-card-header">
                <div>
                    <h2>Курсы валют</h2>
                    <p>Курс указан относительно тенге.</p>
                </div>
                <span>Сегодня</span>
            </div>

            <table class="exchange-table">
                <thead>
                <tr>
                    <th>Валюта</th>
                    <th>Курс к KZT</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="currency : ${currencies}">
                    <td>
                        <strong th:text="${currency.name}">USD</strong>
                    </td>
                    <td th:text="${currency.rateToKzt}">450.00</td>
                </tr>
                </tbody>
            </table>
        </section>

        <section class="exchange-converter-card">
            <h2>Быстрый расчет</h2>

            <form method="post" th:action="@{/exchange/calculate}">
                <div class="converter-field">
                    <label for="amount">Отдаете</label>
                    <div class="converter-input">
                        <input id="amount" name="amount" type="number" min="0.01" step="0.01" placeholder="0" required>
                        <select name="fromCurrencyId" required>
                            <option th:each="currency : ${currencies}" th:value="${currency.currencyId}" th:text="${currency.name}">KZT</option>
                        </select>
                    </div>
                </div>

                <div class="converter-field">
                    <label for="toCurrencyId">Получаете</label>
                    <div class="converter-input">
                        <input id="calculationResult" th:value="${calculationResult}" placeholder="0" readonly>
                        <select id="toCurrencyId" name="toCurrencyId" required>
                            <option th:each="currency : ${currencies}" th:value="${currency.currencyId}" th:text="${currency.name}">USD</option>
                        </select>
                    </div>
                </div>

                <button class="exchange-button" type="submit">Рассчитать</button>
            </form>

            <form class="exchange-operation-form" method="post" th:action="@{/exchange}">
                <h2>Обменять между счетами</h2>

                <div class="settings-field">
                    <label for="senderAccountId">Со счета</label>
                    <select id="senderAccountId" name="senderAccountId" required>
                        <option value="" disabled selected>Выберите счет</option>
                        <option th:each="account : ${accountOptions}" th:value="${account.accountId}" th:text="${account.label}">KZT счет</option>
                    </select>
                </div>

                <div class="settings-field">
                    <label for="receiverAccountId">На счет</label>
                    <select id="receiverAccountId" name="receiverAccountId" required>
                        <option value="" disabled selected>Выберите счет</option>
                        <option th:each="account : ${accountOptions}" th:value="${account.accountId}" th:text="${account.label}">USD счет</option>
                    </select>
                </div>

                <div class="settings-field">
                    <label for="exchangeAmount">Сумма списания</label>
                    <input id="exchangeAmount" name="amount" type="number" min="0.01" step="0.01" placeholder="0" required>
                </div>

                <button class="exchange-button" type="submit">Обменять</button>
            </form>

            <p class="exchange-hint" th:if="${missingCurrencies != null && !missingCurrencies.isEmpty()}">
                Для обмена может понадобиться счет в валюте:
                <span th:text="${#strings.listJoin(missingCurrencies, ', ')}">USD</span>.
                Откройте новый счет в разделе «Мой Банк».
            </p>
        </section>
    </div>

    <section class="exchange-rates-card manager-rate-card" th:if="${adminLoggedIn}">
        <h2>Обновить курс</h2>
        <form class="settings-form" method="post" th:action="@{/admin/settings/currency-rate}">
            <div class="settings-field">
                <label for="rateCurrencyId">Валюта</label>
                <select id="rateCurrencyId" name="currencyId" required>
                    <option th:each="currency : ${currencies}" th:value="${currency.currencyId}" th:text="${currency.name}">USD</option>
                </select>
            </div>
            <div class="settings-field">
                <label for="rateToKzt">Новый курс к KZT</label>
                <input id="rateToKzt" name="rateToKzt" type="number" min="0.0001" step="0.0001" placeholder="450.00" required>
            </div>
            <button class="save-settings-button" type="submit">Сохранить курс</button>
        </form>
    </section>

</main>

</body>
</html>
