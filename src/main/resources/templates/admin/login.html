<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Админ</title>
    <link rel="stylesheet" href="../static/css/styles.css" th:href="@{/css/styles.css}">
    <meta charset="UTF-8">
</head>
<body>

<main class="auth-page">
    <section class="auth-card">
        <div class="auth-header">
            <a href="#" th:href="@{/}" class="auth-logo">Bank Admin</a>
            <span>Админ панель</span>
            <h1>Войти</h1>
        </div>

        <form class="auth-form" method="post" th:action="@{/admin/login}">
            <div class="auth-errors" th:if="${adminLoginError}">
                <p th:text="${adminLoginError}">Ошибка</p>
            </div>

            <div class="auth-field">
                <label for="login">Логин</label>
                <input id="login" name="login" type="text" th:value="${adminLogin}" placeholder="admin" required>
            </div>

            <div class="auth-field">
                <label for="password">Пароль</label>
                <input id="password" name="password" type="password" placeholder="12345" required>
            </div>

            <button class="auth-submit-button" type="submit">Войти</button>
        </form>
    </section>
</main>

</body>
</html>
