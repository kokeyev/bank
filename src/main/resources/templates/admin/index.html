<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Админ</title>
    <link rel="stylesheet" href="../static/css/styles.css" th:href="@{/css/styles.css}">
    <meta charset="UTF-8">
</head>
<body>

<div th:replace="~{fragments/admin-header :: header}"></div>

<main class="settings-page">
    <h1>Админ</h1>

    <div class="loan-message loan-message-success" th:if="${adminSuccess}" th:text="${adminSuccess}">Готово.</div>
    <div class="loan-message loan-message-error" th:if="${adminError}" th:text="${adminError}">Ошибка.</div>

    <div class="settings-layout">
        <section class="settings-card account-actions-card">
            <h2>Новые менеджеры</h2>

            <div class="accounts-empty-state" th:if="${pendingManagers == null || pendingManagers.isEmpty()}">
                <p>Нет новых заявок менеджеров.</p>
            </div>

            <div class="admin-list" th:if="${pendingManagers != null && !pendingManagers.isEmpty()}">
                <div class="admin-list-item" th:each="manager : ${pendingManagers}">
                    <div>
                        <strong th:text="${manager.name + ' ' + manager.surname}">Имя Фамилия</strong>
                        <span th:text="${manager.emailAddress + ' / ' + manager.phoneNumber}">manager@example.com</span>
                    </div>
                    <div class="settings-actions">
                        <form method="post" th:action="@{/admin/managers/{managerId}/approve(managerId=${manager.userId})}">
                            <button class="save-settings-button" type="submit">Одобрить</button>
                        </form>
                        <form method="post" th:action="@{/admin/managers/{managerId}/reject(managerId=${manager.userId})}">
                            <button class="delete-account-button" type="submit">Отклонить</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>

        <section class="settings-card">
            <h2>Комиссия</h2>
            <form class="settings-form" method="post" th:action="@{/admin/settings/fee}">
                <div class="settings-field">
                    <label for="transferFeePercent">Комиссия за перевод, %</label>
                    <input id="transferFeePercent" name="transferFeePercent" type="number" min="0" step="0.01" th:value="${transferFeePercent}" required>
                </div>
                <button class="save-settings-button" type="submit">Сохранить</button>
            </form>
        </section>

        <section class="settings-card">
            <h2>Курсы валют</h2>
            <form class="settings-form" method="post" th:action="@{/admin/settings/currency-rate}">
                <div class="settings-field">
                    <label for="currencyId">Валюта</label>
                    <select id="currencyId" name="currencyId" required>
                        <option th:each="currency : ${currencies}" th:value="${currency.currencyId}" th:text="${currency.name + ' / ' + currency.rateToKzt}">USD</option>
                    </select>
                </div>
                <div class="settings-field">
                    <label for="rateToKzt">Новый курс к KZT</label>
                    <input id="rateToKzt" name="rateToKzt" type="number" min="0.0001" step="0.0001" required>
                </div>
                <button class="save-settings-button" type="submit">Обновить</button>
            </form>
        </section>

        <section class="settings-card">
            <h2>Ставки депозитов</h2>
            <form class="settings-form" method="post" th:action="@{/admin/settings/deposit-rate}">
                <div class="settings-field">
                    <label for="depositTypeId">Депозит</label>
                    <select id="depositTypeId" name="depositTypeId" required>
                        <option th:each="type : ${depositTypes}" th:value="${type.depositTypeId}" th:text="${type.name + ' / ' + type.duration + ' мес. / ' + type.rate + '%'}">Копилка</option>
                    </select>
                </div>
                <div class="settings-field">
                    <label for="depositRate">Новая ставка, %</label>
                    <input id="depositRate" name="rate" type="number" min="0" step="0.01" required>
                </div>
                <button class="save-settings-button" type="submit">Обновить</button>
            </form>
        </section>

        <section class="settings-card">
            <h2>Ставки кредитов</h2>
            <form class="settings-form" method="post" th:action="@{/admin/settings/loan-rate}">
                <div class="settings-field">
                    <label for="loanTypeId">Кредит</label>
                    <select id="loanTypeId" name="loanTypeId" required>
                        <option th:each="type : ${loanTypes}" th:value="${type.loanTypeId}" th:text="${type.name + ' / ' + type.rate + '%'}">На любые цели</option>
                    </select>
                </div>
                <div class="settings-field">
                    <label for="loanRate">Новая ставка, %</label>
                    <input id="loanRate" name="rate" type="number" min="0" step="0.01" required>
                </div>
                <button class="save-settings-button" type="submit">Обновить</button>
            </form>
        </section>
    </div>
</main>

</body>
</html>
