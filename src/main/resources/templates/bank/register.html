<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{auth.register.title}">Регистрация в Bank</title>
    <link rel="stylesheet" href="../static/css/styles.css" th:href="@{/css/styles.css}">
    <meta charset="UTF-8">
</head>
<body>

<main class="auth-page">
    <section class="auth-card auth-card-wide">
        <div class="auth-header">
            <a href="../accounts/index.html" th:href="@{/}" class="auth-logo">Bank</a>
            <span th:text="#{auth.register.subtitle}">Новый аккаунт</span>
            <h1 th:text="#{auth.register.heading}">Регистрация</h1>
        </div>

        <form class="auth-form" method="post" th:action="@{/register}" th:object="${createUserRequest}">
            <input type="hidden" name="_csrf" th:value="${csrfToken}">
            <div class="auth-errors" th:if="${errors}">
                <p th:each="error : ${errors}" th:text="${error}">Ошибка регистрации</p>
            </div>

            <div class="auth-fields-grid">
                <div class="auth-field">
                    <label for="name" th:text="#{auth.register.name}">Имя</label>
                    <input id="name" name="name" th:field="*{name}" type="text" th:placeholder="#{auth.register.name.placeholder}" required>
                    <p class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Ошибка</p>
                </div>

                <div class="auth-field">
                    <label for="surname" th:text="#{auth.register.surname}">Фамилия</label>
                    <input id="surname" name="surname" th:field="*{surname}" type="text" th:placeholder="#{auth.register.surname.placeholder}" required>
                    <p class="field-error" th:if="${#fields.hasErrors('surname')}" th:errors="*{surname}">Ошибка</p>
                </div>
            </div>

            <div class="auth-field">
                <label for="phone" th:text="#{auth.register.phone}">Номер телефона</label>
                <input id="phone" name="phone" th:field="*{phone}" type="tel" placeholder="+7 700 000 00 00" required>
                <p class="field-error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}">Ошибка</p>
            </div>

            <div class="auth-field">
                <label for="email" th:text="#{auth.register.email}">Почта</label>
                <input id="email" name="email" th:field="*{email}" type="email" placeholder="mail@example.com" required>
                <p class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Ошибка</p>
            </div>

            <div class="auth-field">
                <label for="password" th:text="#{auth.password}">Пароль</label>
                <input id="password" name="password" th:field="*{password}" type="password" th:placeholder="#{auth.password.placeholder}" required>
                <p class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Ошибка</p>
            </div>

            <div class="auth-field">
                <label for="confirmPassword" th:text="#{auth.register.confirmPassword}">Введите пароль снова</label>
                <input id="confirmPassword" name="confirmPassword" th:field="*{confirmPassword}" type="password" th:placeholder="#{auth.register.confirmPassword.placeholder}" required>
                <p class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}">Ошибка</p>
            </div>

            <button class="auth-submit-button" type="submit" th:text="#{auth.register.submit}">Зарегистрироваться</button>

            <p class="auth-switch-link">
                <span th:text="#{auth.register.hasAccount}">Уже есть аккаунт?</span>
                <a href="login.html" th:href="@{/login}" th:text="#{nav.login}">Войти</a>
            </p>
        </form>
    </section>
</main>

</body>
</html>
