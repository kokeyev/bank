<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Регистрация в Bank</title>
    <link rel="stylesheet" href="../static/css/styles.css" th:href="@{/css/styles.css}">
    <meta charset="UTF-8">
</head>
<body>

<main class="auth-page">
    <section class="auth-card auth-card-wide">
        <div class="auth-header">
            <a href="../accounts/index.html" th:href="@{/}" class="auth-logo">Bank</a>
            <span>Новый аккаунт</span>
            <h1>Регистрация</h1>
        </div>

        <form class="auth-form" method="post" th:action="@{/register}" th:object="${createUserRequest}">
            <div class="auth-errors" th:if="${errors}">
                <p th:each="error : ${errors}" th:text="${error}">Ошибка регистрации</p>
            </div>

            <div class="auth-fields-grid">
                <div class="auth-field">
                    <label for="name">Имя</label>
                    <input id="name" name="name" th:field="*{name}" type="text" placeholder="Введите имя" required>
                </div>

                <div class="auth-field">
                    <label for="surname">Фамилия</label>
                    <input id="surname" name="surname" th:field="*{surname}" type="text" placeholder="Введите фамилию" required>
                </div>
            </div>

            <div class="auth-field">
                <label for="phone">Номер телефона</label>
                <input id="phone" name="phone" th:field="*{phone}" type="tel" placeholder="+7 700 000 00 00" required>
            </div>

            <div class="auth-field">
                <label for="email">Почта</label>
                <input id="email" name="email" th:field="*{email}" type="email" placeholder="mail@example.com" required>
            </div>

            <div class="auth-field">
                <label for="password">Пароль</label>
                <input id="password" name="password" th:field="*{password}" type="password" placeholder="Введите пароль" required>
            </div>

            <div class="auth-field">
                <label for="confirmPassword">Введите пароль снова</label>
                <input id="confirmPassword" name="confirmPassword" th:field="*{confirmPassword}" type="password" placeholder="Повторите пароль" required>
            </div>

            <button class="auth-submit-button" type="submit">Зарегистрироваться</button>

            <p class="auth-switch-link">
                Уже есть аккаунт?
                <a href="login.html" th:href="@{/login}">Войти</a>
            </p>
        </form>
    </section>
</main>

</body>
</html>
