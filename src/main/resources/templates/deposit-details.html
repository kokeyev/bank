<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Открытие депозита</title>
    <link rel="stylesheet" href="../static/css/styles.css" th:href="@{/css/styles.css}">
    <meta charset="UTF-8">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="deposit-details-page">

    <a class="back-link" href="deposits.html" th:href="@{/deposits}">Назад к депозитам</a>

    <div class="deposit-details-card">
        <h1 th:text="${depositName}">Копилка</h1>
        <p>Вы выбрали депозит. На этой странице можно продолжить оформление.</p>
        <button class="open-deposit-button">Открыть депозит</button>
    </div>

</main>

</body>
</html>
