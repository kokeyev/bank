<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Настройки</title>
    <link rel="stylesheet" href="../static/css/styles.css" th:href="@{/css/styles.css}">
    <meta charset="UTF-8">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="settings-page">

    <h1>Настройки</h1>

    <div class="settings-layout">
        <section class="settings-card">
            <h2>Язык интерфейса</h2>
            <p>Выберите язык, на котором будет отображаться приложение.</p>

            <div class="language-options">
                <label>
                    <input type="radio" name="language" checked>
                    <span>Русский</span>
                </label>
                <label>
                    <input type="radio" name="language">
                    <span>Қазақша</span>
                </label>
                <label>
                    <input type="radio" name="language">
                    <span>English</span>
                </label>
            </div>
        </section>

        <section class="settings-card">
            <h2>Контактные данные</h2>
            <p>Обновите номер телефона и почту для уведомлений банка.</p>

            <form class="settings-form">
                <div class="settings-field">
                    <label for="phone">Номер телефона</label>
                    <input id="phone" type="tel" value="+7 777 123 45 67">
                </div>

                <div class="settings-field">
                    <label for="email">Почта</label>
                    <input id="email" type="email" value="client@bank.kz">
                </div>

                <button type="button" class="save-settings-button">Сохранить изменения</button>
            </form>
        </section>

        <section class="settings-card account-actions-card">
            <h2>Аккаунт</h2>
            <p>Управление текущей сессией и аккаунтом пользователя.</p>

            <div class="settings-actions">
                <button type="button" class="logout-button">Выйти с аккаунта</button>
                <button type="button" class="delete-account-button">Удалить аккаунт</button>
            </div>
        </section>
    </div>

</main>

</body>
</html>
