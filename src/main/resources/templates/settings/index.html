<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{settings.title}">Настройки</title>
    <link rel="stylesheet" href="../static/css/styles.css" th:href="@{/css/styles.css}">
    <meta charset="UTF-8">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="settings-page">

    <h1 th:text="#{settings.title}">Настройки</h1>

    <div class="settings-layout">
        <section class="settings-card">
            <h2 th:text="#{settings.language.title}">Язык интерфейса</h2>
            <p th:text="#{settings.language.description}">Выберите язык, на котором будет отображаться приложение.</p>

            <form class="settings-form" method="post" th:action="@{/settings/language}">
            <input type="hidden" name="_csrf" th:value="${csrfToken}">
            <div class="language-options">
                <label>
                    <input type="radio" name="language" value="ru" th:checked="${selectedLanguage == null || selectedLanguage == 'ru'}">
                    <span th:text="#{settings.language.ru}">Русский</span>
                </label>
                <label>
                    <input type="radio" name="language" value="kk" th:checked="${selectedLanguage == 'kk'}">
                    <span th:text="#{settings.language.kk}">Қазақша</span>
                </label>
                <label>
                    <input type="radio" name="language" value="en" th:checked="${selectedLanguage == 'en'}">
                    <span th:text="#{settings.language.en}">English</span>
                </label>
            </div>
            <button type="submit" class="save-settings-button" th:text="#{settings.language.save}">Сохранить язык</button>
            </form>
        </section>

        <section class="settings-card" th:if="${loggedIn}">
            <h2 th:text="#{settings.contact.title}">Контактные данные</h2>
            <p th:text="#{settings.contact.description}">Обновите номер телефона и почту для уведомлений банка.</p>

            <form class="settings-form" method="post" th:action="@{/settings/contact}">
            <input type="hidden" name="_csrf" th:value="${csrfToken}">
                <div class="settings-message settings-message-success" th:if="${contactSuccess}" th:text="${contactSuccess}">
                    Контактные данные обновлены.
                </div>

                <div class="settings-message settings-message-error" th:if="${contactErrors}">
                    <p th:each="error : ${contactErrors}" th:text="${error}">Ошибка</p>
                </div>

                <div class="settings-field">
                    <label for="phone" th:text="#{settings.contact.phone}">Номер телефона</label>
                    <input id="phone" name="phone" type="tel" th:placeholder="${phonePlaceholder ?: '+7 700 000 00 00'}">
                </div>

                <div class="settings-field">
                    <label for="email" th:text="#{settings.contact.email}">Почта</label>
                    <input id="email" name="email" type="email" th:placeholder="${emailPlaceholder ?: 'mail@example.com'}">
                </div>

                <button type="submit" class="save-settings-button" th:text="#{settings.contact.save}">Сохранить изменения</button>
            </form>
        </section>

        <section class="settings-card account-actions-card" th:if="${loggedIn}">
            <h2 th:text="#{settings.account.title}">Аккаунт</h2>
            <p th:text="#{settings.account.description}">Управление текущей сессией и аккаунтом пользователя.</p>

            <form class="settings-form" method="post" th:action="@{/settings/password}">
            <input type="hidden" name="_csrf" th:value="${csrfToken}">
                <div class="settings-message settings-message-success" th:if="${passwordSuccess}" th:text="${passwordSuccess}">
                    Пароль обновлен.
                </div>

                <div class="settings-message settings-message-error" th:if="${passwordErrors}">
                    <p th:each="error : ${passwordErrors}" th:text="${error}">Ошибка</p>
                </div>

                <div class="settings-field">
                    <label for="currentPassword" th:text="#{settings.password.current}">Текущий пароль</label>
                    <input id="currentPassword" name="currentPassword" type="password" required>
                </div>

                <div class="settings-field">
                    <label for="newPassword" th:text="#{settings.password.new}">Новый пароль</label>
                    <input id="newPassword" name="newPassword" type="password" required>
                </div>

                <div class="settings-field">
                    <label for="confirmPassword" th:text="#{settings.password.confirm}">Повторите новый пароль</label>
                    <input id="confirmPassword" name="confirmPassword" type="password" required>
                </div>

                <button type="submit" class="save-settings-button" th:text="#{settings.password.change}">Изменить пароль</button>
            </form>

            <div class="settings-actions">
                <form method="post" th:action="@{/logout}">
            <input type="hidden" name="_csrf" th:value="${csrfToken}">
                    <button type="submit" class="logout-button" th:text="#{settings.account.logout}">Выйти с аккаунта</button>
                </form>
                <form method="post" th:action="@{/settings/deactivate}">
            <input type="hidden" name="_csrf" th:value="${csrfToken}">
                    <button type="submit" class="delete-account-button" th:text="#{settings.account.deactivate}">Деактивировать аккаунт</button>
                </form>
            </div>
        </section>
    </div>

</main>

</body>
</html>
