<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{deposits.kopilka.name}">Открыть депозит Копилка</title>
    <link rel="stylesheet" href="../static/css/styles.css" th:href="@{/css/styles.css}">
    <meta charset="UTF-8">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="deposit-form-page">

    <a class="back-link" href="index.html" th:href="@{/deposits}" th:text="#{deposits.back}">Назад к депозитам</a>

    <section class="deposit-open-card">
        <div class="deposit-form-header">
            <span th:text="#{deposits.open}">Открыть депозит</span>
            <h1 th:text="#{deposits.kopilka.name}">Копилка</h1>
            <p th:text="#{deposits.kopilka.formDescription}">Гибкий депозит с пополнением и возможностью снятия.</p>
        </div>

        <form class="deposit-open-form" method="post" th:action="@{/deposits/kopilka}" th:object="${openDepositRequest}">
            <input type="hidden" name="_csrf" th:value="${csrfToken}">
            <div class="deposit-message deposit-message-success" th:if="${depositSuccess}" th:text="${depositSuccess}">Депозит открыт.</div>
            <div class="deposit-message deposit-message-error" th:if="${depositError}" th:text="${depositError}">Не удалось открыть депозит.</div>
            <div class="deposit-message" th:if="${accountOptions == null || accountOptions.isEmpty()}" th:text="#{deposits.needAccount}">Войдите в аккаунт и откройте счет, чтобы открыть депозит.</div>

            <div class="deposit-form-field">
                <label for="sourceAccountId" th:text="#{deposits.fromAccount}">Со счета</label>
                <select id="sourceAccountId" name="sourceAccountId" th:field="*{sourceAccountId}" required>
                    <option value="" disabled selected th:text="#{deposits.accountList}">Список счетов</option>
                    <option th:each="account : ${accountOptions}" th:value="${account.accountId}" th:text="${account.label}">Основная - 100 000.00 KZT</option>
                </select>
            </div>

            <div class="deposit-form-field">
                <label for="amount" th:text="#{deposits.enterAmount}">Введите сумму</label>
                <input id="amount" name="amount" th:field="*{amount}" type="number" min="0.01" step="0.01" placeholder="0" required>
            </div>

            <div class="deposit-form-field">
                <label for="depositTypeId" th:text="#{deposits.conditions}">Условия депозита</label>
                <select id="depositTypeId" name="depositTypeId" th:field="*{depositTypeId}" required>
                    <option value="" disabled selected th:text="#{deposits.conditions.placeholder}">Срок, валюта и ставка</option>
                    <option th:each="type : ${depositTypeOptions}" th:value="${type.depositTypeId}" th:text="${type.label}">12 мес. / KZT / 11.5%</option>
                </select>
            </div>

            <div class="deposit-switches">
                <label class="switch-row">
                    <span th:text="#{deposits.autoRenewal}">Автопродление</span>
                    <input type="checkbox" name="autoRenewal" th:field="*{autoRenewal}">
                    <span class="switch-control"></span>
                </label>

                <label class="switch-row">
                    <span th:text="#{deposits.reinvest}">Вознаграждение оставлять на депозите</span>
                    <input type="checkbox" name="reinvestInterest" th:field="*{reinvestInterest}">
                    <span class="switch-control"></span>
                </label>
            </div>

            <button class="open-deposit-submit-button" type="submit" th:text="#{deposits.open}">Открыть депозит</button>
        </form>
    </section>

</main>

</body>
</html>
