<!DOCTYPE html>
<html>
<head>
    <title>Админ</title>
    <link rel="stylesheet" href="/bank/css/styles.css">
    <meta charset="UTF-8">
</head>
<body>

<header>
  <nav class="navbar">
    <div class="logo">
      <a href="/bank/admin">Bank Admin</a>
    </div>

    <ul class="nav-links">
      <li><a href="/bank/admin">Панель</a></li>
      <li>
        <form class="header-logout-form" method="post" action="/bank/admin/logout">
          <button class="header-auth-link" type="submit">Выйти</button>
        </form>
      </li>
    </ul>
  </nav>
</header>

<main class="settings-page">
    <h1>Админ</h1>

    
    

    <div class="settings-layout">
        <section class="settings-card account-actions-card">
            <h2>Новые менеджеры</h2>

            

            <div class="admin-list">
                <div class="admin-list-item">
                    <div>
                        <strong>Алихан Ваня</strong>
                        <span>n@gmail.com / +77015556677</span>
                    </div>
                    <div class="settings-actions">
                        <form method="post" action="/bank/admin/managers/7/approve">
                            <button class="save-settings-button" type="submit">Одобрить</button>
                        </form>
                        <form method="post" action="/bank/admin/managers/7/reject">
                            <button class="delete-account-button" type="submit">Отклонить</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>

        <section class="settings-card">
            <h2>Комиссия</h2>
            <form class="settings-form" method="post" action="/bank/admin/settings/fee">
                <div class="settings-field">
                    <label for="transferFeePercent">Комиссия за перевод, %</label>
                    <input id="transferFeePercent" name="transferFeePercent" type="number" min="0" step="0.01" value="0" required>
                </div>
                <button class="save-settings-button" type="submit">Сохранить</button>
            </form>
        </section>

        <section class="settings-card">
            <h2>Курсы валют</h2>
            <form class="settings-form" method="post" action="/bank/admin/settings/currency-rate">
                <div class="settings-field">
                    <label for="currencyId">Валюта</label>
                    <select id="currencyId" name="currencyId" required>
                        <option value="3">EUR / 300.000000</option>
                        <option value="1">KZT / 1.000000</option>
                        <option value="4">RUB / 5.800000</option>
                        <option value="2">USD / 520.000000</option>
                    </select>
                </div>
                <div class="settings-field">
                    <label for="rateToKzt">Новый курс к KZT</label>
                    <input id="rateToKzt" name="rateToKzt" type="number" min="0.0001" step="0.0001" required>
                </div>
                <button class="save-settings-button" type="submit">Обновить</button>
            </form>
        </section>

        <section class="settings-card">
            <h2>Ставки депозитов</h2>
            <form class="settings-form" method="post" action="/bank/admin/settings/deposit-rate">
                <div class="settings-field">
                    <label for="depositTypeId">Депозит</label>
                    <select id="depositTypeId" name="depositTypeId" required>
                        <option value="56">Капитал / 12 мес. / 1.60%</option>
                        <option value="55">Капитал / 9 мес. / 1.35%</option>
                        <option value="54">Капитал / 6 мес. / 1.10%</option>
                        <option value="53">Капитал / 3 мес. / 0.80%</option>
                        <option value="52">Капитал / 12 мес. / 16.00%</option>
                        <option value="51">Капитал / 9 мес. / 15.20%</option>
                        <option value="50">Капитал / 6 мес. / 14.50%</option>
                        <option value="49">Капитал / 3 мес. / 13.00%</option>
                        <option value="25">Копилка / 6 мес. / 0.30%</option>
                        <option value="26">Копилка / 12 мес. / 0.50%</option>
                        <option value="27">Копилка / 24 мес. / 0.70%</option>
                        <option value="28">Копилка / 36 мес. / 0.90%</option>
                        <option value="29">Копилка / 6 мес. / 2.00%</option>
                        <option value="30">Копилка / 12 мес. / 2.50%</option>
                        <option value="31">Копилка / 24 мес. / 3.00%</option>
                        <option value="32">Копилка / 36 мес. / 3.20%</option>
                        <option value="17">Копилка / 6 мес. / 10.00%</option>
                        <option value="18">Копилка / 12 мес. / 11.50%</option>
                        <option value="19">Копилка / 24 мес. / 12.50%</option>
                        <option value="20">Копилка / 36 мес. / 13.00%</option>
                        <option value="21">Копилка / 6 мес. / 0.50%</option>
                        <option value="22">Копилка / 12 мес. / 0.80%</option>
                        <option value="23">Копилка / 24 мес. / 1.00%</option>
                        <option value="24">Копилка / 36 мес. / 1.20%</option>
                        <option value="41">Стратегия / 3 мес. / 0.40%</option>
                        <option value="42">Стратегия / 6 мес. / 0.70%</option>
                        <option value="43">Стратегия / 12 мес. / 1.00%</option>
                        <option value="44">Стратегия / 24 мес. / 1.20%</option>
                        <option value="45">Стратегия / 3 мес. / 2.30%</option>
                        <option value="46">Стратегия / 6 мес. / 2.80%</option>
                        <option value="47">Стратегия / 12 мес. / 3.30%</option>
                        <option value="48">Стратегия / 24 мес. / 3.70%</option>
                        <option value="40">Стратегия / 24 мес. / 1.50%</option>
                        <option value="39">Стратегия / 12 мес. / 1.20%</option>
                        <option value="38">Стратегия / 6 мес. / 0.90%</option>
                        <option value="37">Стратегия / 3 мес. / 0.60%</option>
                        <option value="36">Стратегия / 24 мес. / 15.00%</option>
                        <option value="35">Стратегия / 12 мес. / 14.00%</option>
                        <option value="34">Стратегия / 6 мес. / 12.50%</option>
                        <option value="33">Стратегия / 3 мес. / 11.00%</option>
                    </select>
                </div>
                <div class="settings-field">
                    <label for="depositRate">Новая ставка, %</label>
                    <input id="depositRate" name="rate" type="number" min="0" step="0.01" required>
                </div>
                <button class="save-settings-button" type="submit">Обновить</button>
            </form>
        </section>

        <section class="settings-card">
            <h2>Ставки кредитов</h2>
            <form class="settings-form" method="post" action="/bank/admin/settings/loan-rate">
                <div class="settings-field">
                    <label for="loanTypeId">Кредит</label>
                    <select id="loanTypeId" name="loanTypeId" required>
                        <option value="2">Автокредит / 18.00%</option>
                        <option value="3">Ипотека / 16.00%</option>
                        <option value="1">На любые цели / 21.00%</option>
                    </select>
                </div>
                <div class="settings-field">
                    <label for="loanRate">Новая ставка, %</label>
                    <input id="loanRate" name="rate" type="number" min="0" step="0.01" required>
                </div>
                <button class="save-settings-button" type="submit">Обновить</button>
            </form>
        </section>
    </div>
</main>

</body>
</html>
